# config/services.yaml

# -------------------------------
# Paramètres globaux
# -------------------------------
parameters:
    uploads_directory: '%kernel.project_dir%/public/images'


# -------------------------------
# Services auto-wire
# -------------------------------
services:
    # Auto-wire tous les services de src/
    App\:
        resource: '../src/*'
        exclude: '../src/{DependencyInjection,Entity,Migrations,Tests,Kernel.php}'
        autowire: true
        autoconfigure: true